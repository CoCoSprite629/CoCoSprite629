<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <!-- 天空渐变：深紫到蓝色 -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#3d1b69;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#5c2a94;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a3fb0;stop-opacity:1" />
    </linearGradient>

    <!-- 太阳渐变 -->
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff33cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff99cc;stop-opacity:1" />
    </linearGradient>

    <!-- 水面渐变 -->
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a5e;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0d0221;stop-opacity:1" />
    </linearGradient>

    <!-- 霓虹发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 扫描线 -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- 天空背景 -->
  <rect width="900" height="300" fill="url(#skyGradient)" />
  <rect width="900" height="300" fill="url(#scanlines)" />

  <!-- 星星 -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="80" cy="40" r="1.2" />
    <circle cx="150" cy="25" r="0.8" />
    <circle cx="220" cy="55" r="1" />
    <circle cx="320" cy="30" r="0.9" />
    <circle cx="420" cy="45" r="1.1" />
    <circle cx="520" cy="20" r="0.8" />
    <circle cx="620" cy="50" r="1" />
    <circle cx="720" cy="35" r="0.9" />
    <circle cx="820" cy="60" r="1.2" />
    <circle cx="70" cy="80" r="0.7" />
    <circle cx="180" cy="70" r="0.8" />
    <circle cx="280" cy="85" r="0.7" />
    <circle cx="380" cy="75" r="0.9" />
    <circle cx="480" cy="90" r="0.8" />
    <circle cx="580" cy="78" r="0.7" />
    <circle cx="680" cy="88" r="0.9" />
    <circle cx="780" cy="72" r="0.8" />
    <circle cx="880" cy="82" r="0.7" />
  </g>

  <!-- 太阳（右侧大落日） -->
  <g transform="translate(650, 140)">
    <circle cx="0" cy="0" r="130" fill="url(#sunGradient)" filter="url(#glow)" opacity="0.95" />
    <!-- 太阳条纹遮罩 -->
    <rect x="-130" y="-130" width="260" height="18" fill="#5c2a94" opacity="0.85" />
    <rect x="-130" y="-100" width="260" height="14" fill="#5c2a94" opacity="0.8" />
    <rect x="-130" y="-70" width="260" height="12" fill="#5c2a94" opacity="0.75" />
    <rect x="-130" y="-45" width="260" height="10" fill="#5c2a94" opacity="0.7" />
    <rect x="-130" y="20" width="260" height="16" fill="#5c2a94" opacity="0.8" />
    <rect x="-130" y="50" width="260" height="14" fill="#5c2a94" opacity="0.85" />
    <rect x="-130" y="80" width="260" height="18" fill="#5c2a94" opacity="0.9" />
  </g>

  <!-- 远山 -->
  <path d="M 0 220 L 120 170 L 240 210 L 350 160 L 480 200 L 580 175 L 700 215 L 900 180 L 900 300 L 0 300 Z" fill="#0f0820" opacity="0.7" />
  <path d="M 0 240 L 100 205 L 220 230 L 340 200 L 460 225 L 560 208 L 680 235 L 900 210 L 900 300 L 0 300 Z" fill="#0a0518" opacity="0.85" />

  <!-- 水面/地平线 -->
  <rect x="0" y="240" width="900" height="60" fill="url(#waterGradient)" />

  <!-- 水面反光 -->
  <g opacity="0.4">
    <rect x="620" y="245" width="120" height="2" fill="#ff00ff" filter="url(#glow)" />
    <rect x="640" y="252" width="80" height="2" fill="#ff00ff" filter="url(#glow)" />
    <rect x="660" y="259" width="40" height="2" fill="#ff00ff" filter="url(#glow)" />
    <rect x="600" y="266" width="140" height="2" fill="#ff00ff" filter="url(#glow)" />
    <rect x="630" y="273" width="70" height="2" fill="#ff00ff" filter="url(#glow)" />
  </g>

  <!-- 椰子树剪影（左侧） -->
  <g transform="translate(120, 245)">
    <!-- 树干 -->
    <path d="M 0 0 Q 5 -60 15 -120 L 20 -120 Q 10 -60 8 0 Z" fill="#0a0518" />
    <!-- 树叶 -->
    <path d="M 17 -120 Q -20 -150 -50 -115 Q -20 -135 17 -125" fill="#0a0518" />
    <path d="M 17 -120 Q -5 -170 -40 -160 Q -10 -160 17 -128" fill="#0a0518" />
    <path d="M 17 -120 Q 30 -165 65 -150 Q 35 -150 20 -126" fill="#0a0518" />
    <path d="M 17 -120 Q 60 -140 80 -105 Q 50 -125 20 -123" fill="#0a0518" />
    <path d="M 17 -120 Q 40 -100 70 -90 Q 45 -105 20 -117" fill="#0a0518" />
  </g>

  <!-- 椰子树剪影（中间偏左） -->
  <g transform="translate(260, 250) scale(0.8)">
    <!-- 树干 -->
    <path d="M 0 0 Q -3 -55 -10 -110 L -5 -110 Q 5 -55 8 0 Z" fill="#0a0518" />
    <!-- 树叶 -->
    <path d="M -7 -110 Q -45 -140 -70 -100 Q -40 -125 -7 -115" fill="#0a0518" />
    <path d="M -7 -110 Q -25 -165 -55 -155 Q -25 -155 -7 -118" fill="#0a0518" />
    <path d="M -7 -110 Q 15 -165 55 -145 Q 20 -150 -5 -118" fill="#0a0518" />
    <path d="M -7 -110 Q 40 -135 65 -95 Q 35 -120 -5 -113" fill="#0a0518" />
  </g>

  <!-- 前景地面 -->
  <path d="M 0 280 Q 200 270 450 278 Q 700 285 900 275 L 900 300 L 0 300 Z" fill="#070311" />

  <!-- 网格装饰线（透视感） -->
  <g stroke="#00f0ff" stroke-width="1" opacity="0.1" fill="none">
    <line x1="0" y1="300" x2="300" y2="240" />
    <line x1="180" y1="300" x2="420" y2="240" />
    <line x1="360" y1="300" x2="540" y2="240" />
    <line x1="540" y1="300" x2="660" y2="240" />
    <line x1="720" y1="300" x2="780" y2="240" />
    <line x1="900" y1="300" x2="900" y2="240" />
  </g>
  <g stroke="#00f0ff" stroke-width="1" opacity="0.1" fill="none">
    <line x1="0" y1="260" x2="900" y2="260" />
    <line x1="0" y1="270" x2="900" y2="270" />
    <line x1="0" y1="282" x2="900" y2="282" />
    <line x1="0" y1="295" x2="900" y2="295" />
  </g>

  <!-- 霓虹文字 -->
  <text x="50" y="40" font-family="Consolas, monospace" font-size="12" fill="#00f0ff" opacity="0.7" filter="url(#glow)">› CYBER SUNSET</text>
  <text x="50" y="58" font-family="Consolas, monospace" font-size="12" fill="#ff00ff" opacity="0.7" filter="url(#glow)">› VAPORWAVE MODE: ON</text>
</svg>