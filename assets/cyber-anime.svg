<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    
    <filter id="neonBlur">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="url(#bgGrad)" />
  <rect width="400" height="300" fill="url(#grid)" />
  
  <!-- 城市天际线 -->
  <rect x="50" y="180" width="30" height="120" fill="#1a1a2e" stroke="#00f0ff" stroke-width="1" opacity="0.8" />
  <rect x="90" y="150" width="25" height="150" fill="#1a1a2e" stroke="#ff00ff" stroke-width="1" opacity="0.8" />
  <rect x="125" y="170" width="35" height="130" fill="#1a1a2e" stroke="#9d00ff" stroke-width="1" opacity="0.8" />
  <rect x="170" y="140" width="20" height="160" fill="#1a1a2e" stroke="#00f0ff" stroke-width="1" opacity="0.8" />
  <rect x="200" y="160" width="40" height="140" fill="#1a1a2e" stroke="#ff00ff" stroke-width="1" opacity="0.8" />
  <rect x="250" y="145" width="30" height="155" fill="#1a1a2e" stroke="#00f0ff" stroke-width="1" opacity="0.8" />
  <rect x="290" y="165" width="25" height="135" fill="#1a1a2e" stroke="#9d00ff" stroke-width="1" opacity="0.8" />
  <rect x="325" y="155" width="35" height="145" fill="#1a1a2e" stroke="#ff00ff" stroke-width="1" opacity="0.8" />
  
  <!-- 窗户灯光 -->
  <rect x="60" y="190" width="5" height="5" fill="#00f0ff" opacity="0.8" filter="url(#neonBlur)" />
  <rect x="70" y="210" width="5" height="5" fill="#ff00ff" opacity="0.8" filter="url(#neonBlur)" />
  <rect x="100" y="170" width="5" height="5" fill="#00f0ff" opacity="0.8" filter="url(#neonBlur)" />
  <rect x="110" y="190" width="5" height="5" fill="#ff00ff" opacity="0.8" filter="url(#neonBlur)" />
  <rect x="180" y="160" width="5" height="5" fill="#00f0ff" opacity="0.8" filter="url(#neonBlur)" />
  <rect x="210" y="180" width="5" height="5" fill="#ff00ff" opacity="0.8" filter="url(#neonBlur)" />
  <rect x="260" y="170" width="5" height="5" fill="#00f0ff" opacity="0.8" filter="url(#neonBlur)" />
  
  <!-- 霓虹广告牌 -->
  <rect x="130" y="120" width="60" height="20" fill="#ff00ff" opacity="0.3" stroke="#ff00ff" stroke-width="1" filter="url(#neonBlur)" />
  <text x="160" y="135" font-family="Consolas, monospace" font-size="10" fill="#ff00ff" text-anchor="middle" filter="url(#neonBlur)">NEON</text>
  
  <!-- 人物剪影 (赛博朋克风格) -->
  <circle cx="200" cy="130" r="8" fill="#2a2a3e" />
  <rect x="195" y="138" width="10" height="20" fill="#2a2a3e" />
  <line x1="195" y1="145" x2="185" y2="155" stroke="#2a2a3e" stroke-width="2" />
  <line x1="205" y1="145" x2="215" y2="155" stroke="#2a2a3e" stroke-width="2" />
  <line x1="197" y1="158" x2="192" y2="175" stroke="#2a2a3e" stroke-width="2" />
  <line x1="203" y1="158" x2="208" y2="175" stroke="#2a2a3e" stroke-width="2" />
  
  <!-- 装饰文字 -->
  <text x="50" y="250" font-family="Consolas, monospace" font-size="10" fill="#00f0ff" opacity="0.6">› SYSTEM ONLINE</text>
  <text x="50" y="265" font-family="Consolas, monospace" font-size="10" fill="#ff00ff" opacity="0.6">› CONNECTING...</text>
  <text x="50" y="280" font-family="Consolas, monospace" font-size="10" fill="#9d00ff" opacity="0.6">› UPLOADING DATA</text>
</svg>