<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <!-- 天空渐变 -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#3d1b69;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#5c2a94;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a3fb0;stop-opacity:1" />
    </linearGradient>

    <!-- 太阳渐变 -->
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#ff33cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff99cc;stop-opacity:1" />
    </linearGradient>

    <!-- 太阳条纹蒙版：maskUnits="userSpaceOnUse" 确保与元素坐标系一致 -->
    <mask id="sunStripes" maskUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="87" fill="white" />
      <rect x="-87" y="-72" width="174" height="8" fill="black" />
      <rect x="-87" y="-53" width="174" height="7" fill="black" />
      <rect x="-87" y="-37" width="174" height="7" fill="black" />
      <rect x="-87" y="-20" width="174" height="5" fill="black" />
      <rect x="-87" y="0"   width="174" height="8" fill="black" />
      <rect x="-87" y="19"  width="174" height="7" fill="black" />
      <rect x="-87" y="37"  width="174" height="7" fill="black" />
      <rect x="-87" y="55"  width="174" height="8" fill="black" />
    </mask>

    <!-- 水面渐变 -->
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a5e;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0d0221;stop-opacity:1" />
    </linearGradient>

    <!-- 霓虹发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 扫描线 -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- 天空背景 -->
  <rect width="900" height="200" fill="url(#skyGradient)" />
  <rect width="900" height="200" fill="url(#scanlines)" />

  <!-- 星星（y 坐标等比缩小 2/3） -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="80"  cy="27" r="1.2" />
    <circle cx="150" cy="17" r="0.8" />
    <circle cx="220" cy="37" r="1" />
    <circle cx="320" cy="20" r="0.9" />
    <circle cx="420" cy="30" r="1.1" />
    <circle cx="520" cy="13" r="0.8" />
    <circle cx="620" cy="33" r="1" />
    <circle cx="720" cy="23" r="0.9" />
    <circle cx="820" cy="40" r="1.2" />
    <circle cx="70"  cy="53" r="0.7" />
    <circle cx="180" cy="47" r="0.8" />
    <circle cx="280" cy="57" r="0.7" />
    <circle cx="380" cy="50" r="0.9" />
    <circle cx="480" cy="60" r="0.8" />
    <circle cx="580" cy="52" r="0.7" />
    <circle cx="680" cy="59" r="0.9" />
    <circle cx="780" cy="48" r="0.8" />
    <circle cx="880" cy="55" r="0.7" />
  </g>

  <!-- 太阳（右侧大落日，蒙版已修复） -->
  <g transform="translate(650, 93)">
    <circle cx="0" cy="0" r="87" fill="url(#sunGradient)" filter="url(#glow)" opacity="0.95" mask="url(#sunStripes)" />
    <circle cx="0" cy="0" r="88" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.3" filter="url(#glow)" />
  </g>

  <!-- 远山 -->
  <path d="M 0 147 L 120 113 L 240 140 L 350 107 L 480 133 L 580 117 L 700 143 L 900 120 L 900 200 L 0 200 Z" fill="#0f0820" opacity="0.7" />
  <path d="M 0 160 L 100 137 L 220 153 L 340 133 L 460 150 L 560 139 L 680 157 L 900 140 L 900 200 L 0 200 Z" fill="#0a0518" opacity="0.85" />

  <!-- 水面 -->
  <rect x="0" y="160" width="900" height="40" fill="url(#waterGradient)" />

  <!-- 水面反光 -->
  <g opacity="0.4">
    <rect x="620" y="163" width="120" height="2" fill="#ff00ff" filter="url(#glow)" />
    <rect x="640" y="168" width="80"  height="2" fill="#ff00ff" filter="url(#glow)" />
    <rect x="660" y="173" width="40"  height="2" fill="#ff00ff" filter="url(#glow)" />
    <rect x="600" y="177" width="140" height="2" fill="#ff00ff" filter="url(#glow)" />
    <rect x="630" y="182" width="70"  height="2" fill="#ff00ff" filter="url(#glow)" />
  </g>

  <!-- 椰子树剪影（左侧） -->
  <g transform="translate(120, 163)">
    <path d="M 0 0 Q 5 -60 15 -120 L 20 -120 Q 10 -60 8 0 Z" fill="#0a0518" />
    <path d="M 17 -120 Q -20 -150 -50 -115 Q -20 -135 17 -125" fill="#0a0518" />
    <path d="M 17 -120 Q -5 -170 -40 -160 Q -10 -160 17 -128" fill="#0a0518" />
    <path d="M 17 -120 Q 30 -165 65 -150 Q 35 -150 20 -126" fill="#0a0518" />
    <path d="M 17 -120 Q 60 -140 80 -105 Q 50 -125 20 -123" fill="#0a0518" />
    <path d="M 17 -120 Q 40 -100 70 -90 Q 45 -105 20 -117" fill="#0a0518" />
  </g>

  <!-- 椰子树剪影（中间偏左） -->
  <g transform="translate(260, 167) scale(0.8)">
    <path d="M 0 0 Q -3 -55 -10 -110 L -5 -110 Q 5 -55 8 0 Z" fill="#0a0518" />
    <path d="M -7 -110 Q -45 -140 -70 -100 Q -40 -125 -7 -115" fill="#0a0518" />
    <path d="M -7 -110 Q -25 -165 -55 -155 Q -25 -155 -7 -118" fill="#0a0518" />
    <path d="M -7 -110 Q 15 -165 55 -145 Q 20 -150 -5 -118" fill="#0a0518" />
    <path d="M -7 -110 Q 40 -135 65 -95 Q 35 -120 -5 -113" fill="#0a0518" />
  </g>

  <!-- 前景地面 -->
  <path d="M 0 187 Q 200 180 450 185 Q 700 190 900 183 L 900 200 L 0 200 Z" fill="#070311" />

  <!-- 网格装饰线（透视感） -->
  <g stroke="#00f0ff" stroke-width="1" opacity="0.1" fill="none">
    <line x1="0"   y1="200" x2="300" y2="160" />
    <line x1="180" y1="200" x2="420" y2="160" />
    <line x1="360" y1="200" x2="540" y2="160" />
    <line x1="540" y1="200" x2="660" y2="160" />
    <line x1="720" y1="200" x2="780" y2="160" />
    <line x1="900" y1="200" x2="900" y2="160" />
  </g>
  <g stroke="#00f0ff" stroke-width="1" opacity="0.1" fill="none">
    <line x1="0" y1="173" x2="900" y2="173" />
    <line x1="0" y1="180" x2="900" y2="180" />
    <line x1="0" y1="188" x2="900" y2="188" />
    <line x1="0" y1="197" x2="900" y2="197" />
  </g>

  <!-- 霓虹文字 -->
  <text x="50" y="40" font-family="Consolas, monospace" font-size="12" fill="#00f0ff" opacity="0.7" filter="url(#glow)">› CYBER SUNSET</text>
  <text x="50" y="58" font-family="Consolas, monospace" font-size="12" fill="#ff00ff" opacity="0.7" filter="url(#glow)">› VAPORWAVE MODE: ON</text>
</svg>