<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180">
  <defs>
    <!-- ===== Background ===== -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#080818"/>
    </linearGradient>

    <!-- ===== Card fill gradients ===== -->
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff00ff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="fGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9d00ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#9d00ff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="pcbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff9d" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00ff9d" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="eGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9900" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff9900" stop-opacity="0.02"/>
    </linearGradient>

    <!-- ===== Text glow filters — 三层高斯模糊叠加 ===== -->
    <!-- C++ Cyan -->
    <filter id="t-glow-c" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Python Magenta -->
    <filter id="t-glow-p" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Fusion Purple -->
    <filter id="t-glow-f" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- PCB Green -->
    <filter id="t-glow-pcb" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- ESP32 Orange -->
    <filter id="t-glow-e" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ===== Description text glow (subtler) ===== -->
    <filter id="d-glow-c" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="d-glow-p" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="d-glow-f" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="d-glow-pcb" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="d-glow-e" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ===== Border glow filters ===== -->
    <filter id="b-glow-c" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="b-glow-p" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="b-glow-f" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="b-glow-pcb" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="b-glow-e" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="180" fill="url(#bg)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- C++ Card — Cyan Neon                         -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(10, 20)">
    <!-- border outer glow -->
    <rect x="-2" y="-2" width="164" height="144" rx="13" fill="none" stroke="#00f0ff" stroke-width="4" filter="url(#b-glow-c)" opacity="0.45"/>
    <!-- card background fill -->
    <rect x="0" y="0" width="160" height="140" rx="12" fill="url(#cGrad)"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="#00f0ff" fill-opacity="0.04"/>
    <!-- sharp border -->
    <rect x="0" y="0" width="160" height="140" rx="12" fill="none" stroke="#00f0ff" stroke-width="1.2" stroke-opacity="0.85"/>
    <!-- title -->
    <text x="80" y="54" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" filter="url(#t-glow-c)" text-anchor="middle">C++</text>
    <!-- desc -->
    <text x="80" y="90" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c0f5ff" filter="url(#d-glow-c)" text-anchor="middle" opacity="0.85">嵌入式编程</text>
    <text x="80" y="111" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#90e8ff" filter="url(#d-glow-c)" text-anchor="middle" opacity="0.72">高性能计算</text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Python Card — Magenta Neon                   -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(190, 20)">
    <rect x="-2" y="-2" width="164" height="144" rx="13" fill="none" stroke="#ff00ff" stroke-width="4" filter="url(#b-glow-p)" opacity="0.45"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="url(#pGrad)"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="#ff00ff" fill-opacity="0.04"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="none" stroke="#ff00ff" stroke-width="1.2" stroke-opacity="0.85"/>
    <text x="80" y="54" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" filter="url(#t-glow-p)" text-anchor="middle">Python</text>
    <text x="80" y="90" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#f5c0ff" filter="url(#d-glow-p)" text-anchor="middle" opacity="0.85">图象识别</text>
    <text x="80" y="111" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#e890ff" filter="url(#d-glow-p)" text-anchor="middle" opacity="0.72">自动化脚本</text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Fusion 360 Card — Purple Neon                -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(370, 20)">
    <rect x="-2" y="-2" width="164" height="144" rx="13" fill="none" stroke="#9d00ff" stroke-width="4" filter="url(#b-glow-f)" opacity="0.45"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="url(#fGrad)"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="#9d00ff" fill-opacity="0.04"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="none" stroke="#9d00ff" stroke-width="1.2" stroke-opacity="0.85"/>
    <text x="80" y="54" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" filter="url(#t-glow-f)" text-anchor="middle">Fusion 360</text>
    <text x="80" y="90" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#e0c0ff" filter="url(#d-glow-f)" text-anchor="middle" opacity="0.85">三维模型设计</text>
    <text x="80" y="111" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c890ff" filter="url(#d-glow-f)" text-anchor="middle" opacity="0.72">原型快速制作</text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PCB Layout Card — Green Neon                 -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(550, 20)">
    <rect x="-2" y="-2" width="164" height="144" rx="13" fill="none" stroke="#00ff9d" stroke-width="4" filter="url(#b-glow-pcb)" opacity="0.45"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="url(#pcbGrad)"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="#00ff9d" fill-opacity="0.04"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="none" stroke="#00ff9d" stroke-width="1.2" stroke-opacity="0.85"/>
    <text x="80" y="54" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" filter="url(#t-glow-pcb)" text-anchor="middle">PCB Layout</text>
    <text x="80" y="90" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#c0ffe8" filter="url(#d-glow-pcb)" text-anchor="middle" opacity="0.85">电路板设计</text>
    <text x="80" y="111" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#90ffd8" filter="url(#d-glow-pcb)" text-anchor="middle" opacity="0.72">创意快速实现</text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ESP32 Card — Orange Neon                     -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(730, 20)">
    <rect x="-2" y="-2" width="164" height="144" rx="13" fill="none" stroke="#ff9900" stroke-width="4" filter="url(#b-glow-e)" opacity="0.45"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="url(#eGrad)"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="#ff9900" fill-opacity="0.04"/>
    <rect x="0" y="0" width="160" height="140" rx="12" fill="none" stroke="#ff9900" stroke-width="1.2" stroke-opacity="0.85"/>
    <text x="80" y="54" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" filter="url(#t-glow-e)" text-anchor="middle">ESP32</text>
    <text x="80" y="90" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffe8c0" filter="url(#d-glow-e)" text-anchor="middle" opacity="0.85">物联网与嵌入式</text>
    <text x="80" y="111" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffd890" filter="url(#d-glow-e)" text-anchor="middle" opacity="0.72">WiFi / 蓝牙</text>
  </g>
</svg>
