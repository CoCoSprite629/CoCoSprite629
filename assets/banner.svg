<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0221;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 扫描线效果 -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="200" fill="url(#bannerGrad)" />
  <rect width="900" height="200" fill="url(#scanlines)" />
  
  <!-- 装饰线条 -->
  <line x1="50" y1="100" x2="250" y2="100" stroke="#00f0ff" stroke-width="2" opacity="0.6" filter="url(#glow)" />
  <line x1="650" y1="100" x2="850" y2="100" stroke="#ff00ff" stroke-width="2" opacity="0.6" filter="url(#glow)" />
  
  <!-- 主标题 -->
  <text x="450" y="85" font-family="Arial Black, Impact, sans-serif" font-size="48" font-weight="bold" fill="#00f0ff" text-anchor="middle" filter="url(#glow)">CYBER</text>
  <text x="450" y="130" font-family="Arial Black, Impact, sans-serif" font-size="48" font-weight="bold" fill="#ff00ff" text-anchor="middle" filter="url(#glow)">DEVELOPER</text>
  
  <!-- 副标题 -->
  <text x="450" y="165" font-family="Consolas, monospace" font-size="16" fill="#9d00ff" text-anchor="middle" filter="url(#glow)">{ Engineering the Future }</text>
  
  <!-- 装饰元素 -->
  <circle cx="100" cy="100" r="3" fill="#00f0ff" filter="url(#glow)" />
  <circle cx="150" cy="100" r="2" fill="#ff00ff" filter="url(#glow)" />
  <circle cx="800" cy="100" r="3" fill="#ff00ff" filter="url(#glow)" />
  <circle cx="750" cy="100" r="2" fill="#00f0ff" filter="url(#glow)" />
</svg>